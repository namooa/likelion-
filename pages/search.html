<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Fashion - Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/search.css">
</head>
<body>

    <div class="search-page">
        <div class="search-card">
            
            <div class="search-input-row">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <circle cx="8.5" cy="8.5" r="7" stroke="#999" stroke-width="1.5"/>
                    <line x1="13.7" y1="13.7" x2="19" y2="19" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="text" class="search-input" placeholder="Search items" autofocus>
                <a href="homepage.html" class="search-close-btn" aria-label="Close">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <line x1="1" y1="1" x2="15" y2="15" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="15" y1="1" x2="1" y2="15" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </a>
            </div>
            <div class="search-underline"></div>

            
            <p class="popular-label">Popular search terms</p>
            <ul class="popular-list">
                <li><a href="#">Trend</a></li>
                <li><a href="#">Dress</a></li>
                <li><a href="#">Bag</a></li>
                <li><a href="#">Tshirt</a></li>
                <li><a href="#">Beauty</a></li>
                <li><a href="#">Accessories</a></li>
            </ul>
        </div>
    </div>

</body>
</html>
