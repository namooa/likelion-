<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Fashion - Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/checkout.css">
</head>
<body>

    
    <header class="header">
        <a href="menu.html" class="nav-btn" aria-label="Menu">
            <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
                <line x1="0" y1="1" x2="20" y2="1" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="0" y1="7" x2="20" y2="7" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="0" y1="13" x2="20" y2="13" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </a>

        <div class="logo">
            <span class="logo-top">Open</span>
            <span class="logo-bottom">Fashion</span>
        </div>

        <div class="header-right">
            <a href="search.html" class="nav-btn" aria-label="Search">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <circle cx="7.5" cy="7.5" r="6" stroke="#333" stroke-width="1.5"/>
                    <line x1="12.2" y1="12.2" x2="17" y2="17" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </a>
            <a href="checkout.html" class="nav-btn" aria-label="Cart">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                    <path d="M2 2H4L6 13H15L17 5H4.5" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="8" cy="16.5" r="1.2" fill="#333"/>
                    <circle cx="14" cy="16.5" r="1.2" fill="#333"/>
                </svg>
            </a>
        </div>
    </header>

    
    <main class="checkout-main">

        <h1 class="checkout-title">CHECKOUT</h1>

        
        <div class="cart-item">
            <div class="cart-img">
                <img src="../src/img/knit2.png" alt="Recycle Boucle Knit Cardigan Pink">
            </div>
            <div class="cart-info">
                <p class="cart-brand">LAMEREI</p>
                <p class="cart-name">Recycle Boucle Knit Cardigan Pink</p>
                <div class="cart-qty">
                    <button class="qty-btn" id="qty-minus">−</button>
                    <span class="qty-num" id="qty-value">1</span>
                    <button class="qty-btn" id="qty-plus">+</button>
                </div>
                <p class="cart-price">$120</p>
            </div>
        </div>

        <div class="divider"></div>

        
        <div class="cart-row">
            <div class="cart-row-left">
                <svg width="22" height="16" viewBox="0 0 24 16" fill="none">
                    <rect x="1" y="1" width="22" height="14" rx="2" stroke="#333" stroke-width="1.4"/>
                    <path d="M8 1V15" stroke="#333" stroke-width="1.4" stroke-dasharray="2 2"/>
                </svg>
                <span>Add promo code</span>
            </div>
        </div>

        <div class="divider"></div>

        
        <div class="cart-row">
            <div class="cart-row-left">
                <svg width="24" height="18" viewBox="0 0 26 18" fill="none">
                    <rect x="1" y="1" width="16" height="12" rx="1" stroke="#333" stroke-width="1.4"/>
                    <path d="M17 4H21L25 9V13H17V4Z" stroke="#333" stroke-width="1.4" stroke-linejoin="round"/>
                    <circle cx="6" cy="15" r="2" stroke="#333" stroke-width="1.4"/>
                    <circle cx="20" cy="15" r="2" stroke="#333" stroke-width="1.4"/>
                </svg>
                <span>Delivery</span>
            </div>
            <span class="cart-row-right">Free</span>
        </div>

        <div class="divider"></div>

        
        <div class="cart-total">
            <span>Total</span>
            <span class="total-price">$120</span>
        </div>

    </main>

    
    <div class="checkout-btn-wrap">
        <button class="checkout-btn">
            <svg width="18" height="20" viewBox="0 0 20 22" fill="none">
                <path d="M6 10V6C6 3.8 7.8 2 10 2C12.2 2 14 3.8 14 6V10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                <rect x="2" y="10" width="16" height="10" rx="1" stroke="white" stroke-width="1.5"/>
            </svg>
            CHECKOUT
        </button>
    </div>

    <script>
        const minus = document.getElementById('qty-minus');
        const plus = document.getElementById('qty-plus');
        const val = document.getElementById('qty-value');
        let qty = 1;

        minus.addEventListener('click', () => {
            if (qty > 1) { qty--; val.textContent = qty; }
        });
        plus.addEventListener('click', () => {
            qty++; val.textContent = qty;
        });
    </script>

</body>
</html>
